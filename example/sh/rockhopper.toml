# log_level = "info"
# log_level = "debug"
log_level = "quiet"

# docker_args = []

[rocklet]
name = "raygun"
identifier = "test.mars.raygun"
version = "1.2.3"
rev = "81"
maintainer = "Marvin the Martian <marvin@mars.test>"
summary = "Space modulator"
description = "Illudium Q-36 explosive space modulator"
copyright = "Copyright (C) 1948 Marvin the Martian"
license = "0BSD"
url = "https://mars.test/"

# [docker_env]
# key = "value"

[[pkg]]
image = "n4jm4/rockhopper:alpine-linux"
# rocklet.oci_arch = "linux/amd64"
# rocklet.os_arch = "x86_64"
rocklet.os_arch = "noarch"
# rocklet.dependencies = "bash"
# rocklet.apk_makedepends = "gcc"
# rocklet.apk_checkdepends = "diff"
dest."usr/bin" = "bin"

[[pkg]]
image = "n4jm4/rockhopper:fedora"
# rocklet.pkg_licenselogic = "single"
# rocklet.oci_arch = "linux/amd64"
# rocklet.os_arch = "x86_64"
rocklet.os_arch = "noarch"
# rocklet.dependencies = "bash"
dest."usr/bin" = "bin"

[[pkg]]
image = "n4jm4/rockhopper:freebsd"
rocklet.origin = "local/raygun"
# rocklet.oci_arch = "linux/amd64"
# rocklet.os_arch = "freebsd:*:amd64"
rocklet.os_arch = "freebsd:*"
# rocklet.pkg_prefix = "/usr/local"
# rocklet.dependencies = "bash: { origin: \"shells/bash\" }"
dest."usr/local/bin" = "bin"

[[pkg]]
image = "n4jm4/rockhopper:macos"
# rocklet.oci_arch = "linux/amd64"
# rocklet.os_arch = "x86_64"
rocklet.os_arch = "universal"
# rocklet.dependencies = "bash"
#
# macOS user:staff
#
# rocklet.uid = "501"
# rocklet.gid = "20"
# dest."Applications/raygun.app" = "raygun.app"
#
# macOS root:wheel
#
# rocklet.uid = "0"
# rocklet.gid = "0"
dest."usr/local/bin" = "bin"

[[pkg]]
image = "n4jm4/rockhopper:netbsd"
# rocklet.oci_arch = "linux/amd64"
rocklet.os_arch = "x86_64"
# rocklet.pkg_localbase = "/usr/pkg"
# rocklet_opsys = "NetBSD"
# rocklet.dependencies = "bash"
rocklet.pkg_os_version = "10.1"
# byte estimate, including dependencies
rocklet.pkg_size_all = "1000"
dest."bin" = "bin"

[[pkg]]
image = "n4jm4/rockhopper:netbsd"
# rocklet.oci_arch = "linux/arm64"
rocklet.os_arch = "aarch64"
# rocklet.pkg_localbase = "/usr/pkg"
# rocklet_opsys = "NetBSD"
# rocklet.dependencies = "bash"
rocklet.pkg_os_version = "10.1"
# byte estimate, including dependencies
rocklet.pkg_size_all = "1000"
dest."bin" = "bin"

[[pkg]]
image = "n4jm4/rockhopper:ubuntu"
# rocklet.oci_arch = "linux/amd64"
# rocklet.dpkg_priority = "optional"
# rocklet.os_arch = "amd64"
rocklet.os_arch = "all"
# rocklet.dependencies = "bash"
dest."usr/bin" = "bin"
