# log_level = "debug"
log_level = "quiet"

[rocklet]
name = "rockhopper"
identifier = "com.github.mcandre.rockhopper"
version = "0.0.17"
rev = "1"
maintainer = "Andrew Pennebaker <n4jm4@pm.me>"
summary = "metapackage generator"
description = "rockhopper generates installer packages for a wide variety of platforms"
copyright = "Copyright (C) 2026 Andrew Pennebaker"
license = "0BSD"
url = "https://github.com/mcandre/rockhopper"

[[pkg]]
image = "n4jm4/rockhopper:test-alpine-linux"
rocklet.oci_arch = "linux/amd64"
dest."usr/bin" = ".crit/bin/rockhopper-0.0.17/x86_64-unknown-linux-musl"

[[pkg]]
image = "n4jm4/rockhopper:test-fedora"
rocklet.oci_arch = "linux/amd64"
dest."usr/bin" = ".crit/bin/rockhopper-0.0.17/x86_64-unknown-linux-musl"

[[pkg]]
image = "n4jm4/rockhopper:test-freebsd"
rocklet.origin = "local/rockhopper"
rocklet.oci_arch = "linux/amd64"
rocklet.os_arch = "freebsd:*:amd64"
dest."usr/local/bin" = ".crit/bin/rockhopper-0.0.17/x86_64-unknown-freebsd"

[[pkg]]
image = "n4jm4/rockhopper:test-macos"
rocklet.oci_arch = "linux/amd64"
rocklet.os_arch = "x86_64"
dest."usr/local/bin" = ".crit/bin/rockhopper-0.0.17/x86_64-apple-darwin"

[[pkg]]
image = "n4jm4/rockhopper:test-netbsd"
rocklet.oci_arch = "linux/amd64"
rocklet.os_arch = "x86_64"
rocklet.pkg_os_version = "10.1"
# byte estimate, including dependencies
rocklet.pkg_size_all = "1000000"
dest."bin" = ".crit/bin/rockhopper-0.0.17/x86_64-unknown-netbsd"

[[pkg]]
image = "n4jm4/rockhopper:test-ubuntu"
rocklet.oci_arch = "linux/amd64"
dest."usr/bin" = ".crit/bin/rockhopper-0.0.17/x86_64-unknown-linux-musl"

[[pkg]]
image = "n4jm4/rockhopper:test-alpine-linux"
rocklet.oci_arch = "linux/arm64"
dest."usr/bin" = ".crit/bin/rockhopper-0.0.17/aarch64-unknown-linux-musl"

[[pkg]]
image = "n4jm4/rockhopper:test-fedora"
rocklet.oci_arch = "linux/arm64"
dest."usr/bin" = ".crit/bin/rockhopper-0.0.17/aarch64-unknown-linux-musl"

[[pkg]]
image = "n4jm4/rockhopper:test-macos"
rocklet.oci_arch = "linux/arm64"
rocklet.os_arch = "arm64"
dest."usr/local/bin" = ".crit/bin/rockhopper-0.0.17/aarch64-apple-darwin"

[[pkg]]
image = "n4jm4/rockhopper:test-ubuntu"
rocklet.oci_arch = "linux/arm64"
dest."usr/bin" = ".crit/bin/rockhopper-0.0.17/aarch64-unknown-linux-musl"
