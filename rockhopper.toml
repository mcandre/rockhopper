# log_level = "debug"
log_level = "quiet"

[rocklet]
name = "rockhopper"
identifier = "com.github.mcandre.rockhopper"
rev = "1"
maintainer = "Andrew Pennebaker <n4jm4@pm.me>"
manufacturer = "YelloSoft"
summary = "metapackage generator"
description = "rockhopper generates installer packages for a wide variety of platforms"
copyright = "Copyright (C) 2026 Andrew Pennebaker"
license = "0BSD"
url = "https://github.com/mcandre/rockhopper"

[[pkg]]
image = "n4jm4/rockhopper:alpine-linux"
rocklet.oci_arch = "linux/amd64"
dest."usr/bin" = ".crit/bin/rockhopper/x86_64-unknown-linux-musl"

[[pkg]]
image = "n4jm4/rockhopper:alpine-linux"
rocklet.oci_arch = "linux/arm64"
dest."usr/bin" = ".crit/bin/rockhopper/aarch64-unknown-linux-musl"

[[pkg]]
image = "n4jm4/rockhopper:fedora"
rocklet.oci_arch = "linux/amd64"
dest."usr/bin" = ".crit/bin/rockhopper/x86_64-unknown-linux-musl"

[[pkg]]
image = "n4jm4/rockhopper:fedora"
rocklet.oci_arch = "linux/arm64"
dest."usr/bin" = ".crit/bin/rockhopper/aarch64-unknown-linux-musl"

[[pkg]]
image = "n4jm4/rockhopper:freebsd"
rocklet.origin = "local/rockhopper"
rocklet.oci_arch = "linux/amd64"
rocklet.os_arch = "freebsd:*:amd64"
dest."usr/local/bin" = ".crit/bin/rockhopper/x86_64-unknown-freebsd"

[[pkg]]
image = "n4jm4/rockhopper:macos"
rocklet.oci_arch = "linux/amd64"
rocklet.os_arch = "x86_64"
dest."usr/local/bin" = ".crit/bin/rockhopper/x86_64-apple-darwin"

[[pkg]]
image = "n4jm4/rockhopper:macos"
rocklet.oci_arch = "linux/arm64"
rocklet.os_arch = "arm64"
dest."usr/local/bin" = ".crit/bin/rockhopper/aarch64-apple-darwin"

[[pkg]]
image = "n4jm4/rockhopper:ubuntu"
rocklet.oci_arch = "linux/amd64"
dest."usr/bin" = ".crit/bin/rockhopper/x86_64-unknown-linux-musl"

[[pkg]]
image = "n4jm4/rockhopper:ubuntu"
rocklet.oci_arch = "linux/arm64"
dest."usr/bin" = ".crit/bin/rockhopper/aarch64-unknown-linux-musl"
