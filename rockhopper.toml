# log_level = "debug"
log_level = "quiet"

[rocklet]
name = "rockhopper"
identifier = "com.github.mcandre.rockhopper"
version = "0.0.18"
rev = "1"
maintainer = "Andrew Pennebaker <n4jm4@pm.me>"
manufacturer = "YelloSoft"
summary = "metapackage generator"
description = "rockhopper generates installer packages for a wide variety of platforms"
copyright = "Copyright (C) 2026 Andrew Pennebaker"
license = "0BSD"
url = "https://github.com/mcandre/rockhopper"

[[pkg]]
image = "n4jm4/rockhopper:test-alpine-linux"
rocklet.oci_arch = "linux/amd64"
dest."usr/bin" = ".crit/bin/rockhopper-0.0.18/x86_64-unknown-linux-musl"

[[pkg]]
image = "n4jm4/rockhopper:test-fedora"
rocklet.oci_arch = "linux/amd64"
dest."usr/bin" = ".crit/bin/rockhopper-0.0.18/x86_64-unknown-linux-musl"

[[pkg]]
image = "n4jm4/rockhopper:test-freebsd"
rocklet.origin = "local/rockhopper"
rocklet.oci_arch = "linux/amd64"
rocklet.os_arch = "freebsd:*:amd64"
dest."usr/local/bin" = ".crit/bin/rockhopper-0.0.18/x86_64-unknown-freebsd"

[[pkg]]
image = "n4jm4/rockhopper:test-macos"
rocklet.oci_arch = "linux/amd64"
rocklet.os_arch = "x86_64"
dest."usr/local/bin" = ".crit/bin/rockhopper-0.0.18/x86_64-apple-darwin"

[[pkg]]
image = "n4jm4/rockhopper:test-netbsd"
rocklet.oci_arch = "linux/amd64"
rocklet.os_arch = "x86_64"
rocklet.pkg_os_version = "10.1"
# byte estimate, including dependencies
rocklet.pkg_size_all = "1000000"
dest."bin" = ".crit/bin/rockhopper-0.0.18/x86_64-unknown-netbsd"

[[pkg]]
image = "n4jm4/rockhopper:test-ubuntu"
rocklet.oci_arch = "linux/amd64"
dest."usr/bin" = ".crit/bin/rockhopper-0.0.18/x86_64-unknown-linux-musl"

[[pkg]]
image = "n4jm4/rockhopper:test-alpine-linux"
rocklet.oci_arch = "linux/arm64"
dest."usr/bin" = ".crit/bin/rockhopper-0.0.18/aarch64-unknown-linux-musl"

[[pkg]]
image = "n4jm4/rockhopper:test-fedora"
rocklet.oci_arch = "linux/arm64"
dest."usr/bin" = ".crit/bin/rockhopper-0.0.18/aarch64-unknown-linux-musl"

[[pkg]]
image = "n4jm4/rockhopper:test-macos"
rocklet.oci_arch = "linux/arm64"
rocklet.os_arch = "arm64"
dest."usr/local/bin" = ".crit/bin/rockhopper-0.0.18/aarch64-apple-darwin"

[[pkg]]
image = "n4jm4/rockhopper:test-ubuntu"
rocklet.oci_arch = "linux/arm64"
dest."usr/bin" = ".crit/bin/rockhopper-0.0.18/aarch64-unknown-linux-musl"

[[pkg]]
image = "n4jm4/rockhopper:test-windows"
rocklet.oci_arch = "linux/amd64"
rocklet.os_arch = "x64"
rocklet.msi_upgrade_code = "E1F3CEB0-67C9-4F88-86C3-99E895699067"
# rocklet_msi_lcid = "1033"
# rocklet.msi_codepage = "1252"
dest."bin" = ".crit/bin/rockhopper-0.0.18/x86_64-pc-windows-msvc"

[[pkg]]
image = "n4jm4/rockhopper:test-windows"
rocklet.oci_arch = "linux/arm64"
rocklet.os_arch = "arm64"
rocklet.msi_upgrade_code = "E1F3CEB0-67C9-4F88-86C3-99E895699067"
# rocklet_msi_lcid = "1033"
# rocklet.msi_codepage = "1252"
dest."bin" = ".crit/bin/rockhopper-0.0.18/aarch64-pc-windows-msvc"
